gateway:
  name: kerbecs-edge
  version: 3.0.0
  env: ${ENV:DEV}
  limits:
    max_request_bytes: 100MB
    max_response_bytes: 100MB

listeners:
  gateway:
    port: ${PORT:10310}
    # cors:
    #   enabled: true
    #   allowed_origins: [https://app.example.com]
    #   allow_credentials: true
    middlewares: [req-id]
  admin:
    port: ${ADMIN_PORT:10300}
    auth:
      type: basic
      username: ${KERBECS_USER:admin}
      password: ${KERBECS_PASSWORD:admin}

providers:
  static:
    watch: false

middlewares:
  req-id:
    type: request_id
    header: X-Request-Id
    trust_incoming: false

  strip-internal:
    type: headers
    request:
      remove: [X-Internal-Trace]
    response:
      add:
        X-Gateway: kerbecs

upstreams:
  users-service:
    name: users
    version: 1.0.0
    instances:
      - http://localhost:8081
      - http://localhost:8082
      - http://localhost:8083
    load_balancer: round_robin   # round_robin (default) | random
    timeouts:
      dial: 2s
      response_header: 5s
      overall: 30s
      idle: 90s

  echo-service:
    name: echo
    version: 1.0.0
    instances:
      - http://localhost:8082

routes:
  - name: users-api
    match:
      path: /users/*
      methods: [GET, POST, PUT, DELETE]
    upstream: users-service
    envelope: default

  - name: echo-passthrough
    match:
      path: /echo/*
    upstream: echo-service
    rewrite:
      strip_prefix: /echo
    envelope: passthrough
    middlewares: [strip-internal]
    limits:
      max_request_bytes: 10KB   # tight per-route override for demo
